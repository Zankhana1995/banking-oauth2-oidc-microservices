server:
  port: 8082

spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:h2:mem:transactiondb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/banking-realm

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  keycloak:
    token-url: http://localhost:8080/realms/banking-realm/protocol/openid-connect/token
    client-id: transaction-client
    client-secret: 41G2KIDPqHeu1Ae9vETsZfuyelSH5Ii8

logging:
  level:
    org.springframework.security: DEBUG